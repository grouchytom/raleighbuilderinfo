# .github/workflows/update-data.yml
#
# Runs every night at midnight UTC.
# Fetches the latest Raleigh building permit data and commits
# data/permits.json back to the repository.
#
# The app loads this cached file instead of hitting ArcGIS live,
# cutting load time from ~20s to under 1s.

name: Update permit data

on:
  # Run every night at midnight UTC (8pm Eastern)
  schedule:
    - cron: '0 0 * * *'

  # Also allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch permit data
        run: node scripts/fetch-permits.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if permits.json actually changed
          if git diff --quiet data/permits.json; then
            echo "No changes to permits.json — skipping commit"
          else
            git add data/permits.json
            git commit -m "chore: update permit data $(date -u '+%Y-%m-%d')"
            git push
            echo "Committed and pushed updated permits.json"
          fi
