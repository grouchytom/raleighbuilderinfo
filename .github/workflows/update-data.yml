# .github/workflows/update-data.yml
name: Update permit data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Fetch permit data
        run: node scripts/fetch-permits.js

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/permits-new.json data/permits-reno.json data/subs.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update permit and subcontractor data $(date -u '+%Y-%m-%d')"
            git push
            echo "Committed and pushed"
          fi
